name: Build Android Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        chmod +x child_app/gradlew || true
        chmod +x parent_app/gradlew || true

    - name: Build Child App
      run: cd child_app && ./gradlew assembleDebug || echo "Skipping child build if gradlew missing"

    - name: Build Parent App
      run: cd parent_app && ./gradlew assembleDebug || echo "Skipping parent build if gradlew missing"

    - name: Upload Child APK
      uses: actions/upload-artifact@v3
      with:
        name: child-app-debug
        path: child_app/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Parent APK
      uses: actions/upload-artifact@v3
      with:
        name: parent-app-debug
        path: parent_app/app/build/outputs/apk/debug/app-debug.apk
